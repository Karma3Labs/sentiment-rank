# Search settings
[search]
query_type = "Top"  # "Latest" or "Top"
max_pages = 5  # Maximum pages to fetch per query
seed_peers_count = 100  # Number of tweets to process for seed peers

[look_back]
year = 2026
month = 1

parallel_requests = 100
max_tweets = 1000
extended_max_tweets = 100

[search_look_back]
days = 30

[seed_peers]
crypto = [
    "@intocryptoverse",
    "@CryptoCred",
    "@CryptoCapo_",
    "@ColdBloodShill",
    "@CryptoMichNL",
    "@IamCryptoWolf",
    "@AltcoinPsycho",
    "@CryptoJelleNL",
    "@TheCryptoLark",
    "@CryptoKaleo",
    "@I_Am_The_ICT"
]

politics = [
    "@NateSilver538",
    "@EWErickson",
    "@BillKristol",
    "@NathanJRobinson",
    "@mattyglesias",
    "@KyleKulinski",
    "@TuckerCarlson",
    "@AnaKasparian",
    "@SteveSchmidtSES",
    "@benshapiro"
]

# Topic definitions

[[topics]]
event_id = 36173
name = "btc_150k"
description = "When will Bitcoin hit $150k?"
markets = [
    { name = "by March 31, 2026", id = 573654 },
    { name = "by June 30, 2026", id = 573655 },
    { name = "by December 31, 2026", id = 573653 }
]
query = "(bitcoin OR BTC OR $BTC) (150k OR 150000 OR 150,000) (price OR prediction OR forecast OR target OR when OR hit OR reach OR ATH OR all-time high) lang:en -filter:retweets"
